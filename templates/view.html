<h2>All Complaints</h2>
<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Issue</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for row in data %}
<tr>
    <td>{{row[0]}}</td>
    <td>{{row[1]}}</td>
    <td>{{row[2]}}</td>
    <td>{{row[3]}}</td>
    <td>
        <a href="/update/{{row[0]}}">Mark Resolved</a>
    </td>
</tr>
{% endfor %}
</table>
